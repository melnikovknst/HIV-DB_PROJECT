<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    :root {
      --bg: #f6f1ea;
      --card: #ffffff;
      --ink: #1f1a17;
      --muted: #6f645c;
      --accent: #c85f2e;
      --accent-2: #2f5d62;
      --border: #e5ddd4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Georgia", "Times New Roman", serif;
      color: var(--ink);
      background: radial-gradient(1200px 500px at 20% -10%, #ffe8d6 0, transparent 60%),
                  radial-gradient(800px 400px at 90% 10%, #e1efe6 0, transparent 60%),
                  var(--bg);
    }
    .wrap {
      max-width: 980px;
      margin: 36px auto 80px;
      padding: 0 18px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
    }
    .brand {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .nav a {
      text-decoration: none;
      color: var(--accent-2);
      margin-right: 14px;
      font-weight: 600;
    }
    .nav a:last-child { margin-right: 0; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }
    h1, h2 {
      margin: 0 0 16px;
    }
    .muted { color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    .field label {
      display: block;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      background: #fffdfb;
    }
    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: white;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }
    .btn.ghost {
      background: transparent;
      color: var(--accent);
    }
    .alert {
      margin: 12px 0;
      padding: 10px 12px;
      border-radius: 10px;
      background: #fff1eb;
      border: 1px solid #f2c5b5;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    th { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: 0.4px; }
    .chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      background: #f0ebe6;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--muted);
    }
    @media (max-width: 640px) {
      header { flex-direction: column; align-items: flex-start; }
      .brand { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">HIV Clinic</div>
      <div class="nav">
        {% if nav_links %}
          {% for href, label in nav_links %}
            <a href="{{ href }}">{{ label }}</a>
          {% endfor %}
        {% endif %}
      </div>
    </header>
    <div class="card">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
