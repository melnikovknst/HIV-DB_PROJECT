{% extends "base.html" %}
{% block content %}
  <div class="card stack" style="max-width: 560px; margin: 0 auto;">
    <div class="section-head">
      <div>
        <h1>Вход</h1>
        <p class="muted">Выберите роль и укажите ID пользователя.</p>
      </div>
    </div>
    {% if error %}
      <div class="alert">{{ error }}</div>
    {% endif %}
    <form method="post" class="stack">
      <div class="grid">
        <div class="field">
          <label>ID</label>
          <input type="number" name="user_id" required>
        </div>
      </div>
      <div class="actions" style="margin-top: 10px; gap: 14px;">
        <button class="btn" style="padding: 12px 20px;" type="submit" name="role" value="doctor">Я врач</button>
        <button class="btn ghost" style="padding: 12px 20px;" type="submit" name="role" value="patient">Я пациент</button>
      </div>
    </form>
  </div>
{% endblock %}
