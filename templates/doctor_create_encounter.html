{% extends "base.html" %}
{% block content %}
  <div class="card stack">
    <div class="section-head">
      <div>
        <h1>Создать прием</h1>
        <p class="muted">Выберите пациента и заполните параметры приема.</p>
      </div>
      <div class="actions">
        {% if patient %}
          <a class="btn ghost" href="{{ url_for('doctor_patient', patient_id=patient.id) }}">Назад к пациенту</a>
        {% else %}
          <a class="btn ghost" href="{{ url_for('doctor_my_patients') }}">Назад к пациентам</a>
        {% endif %}
      </div>
    </div>
    {% if error %}
      <div class="alert">{{ error }}</div>
    {% endif %}
    <form method="post" class="stack">
      <div class="grid">
        <div class="field">
          <label>Пациент</label>
          <select name="patient_id" required>
            <option value="">Выберите пациента</option>
            {% for p in patients %}
              <option value="{{ p.id }}" {% if form_data.patient_id == p.id|string %}selected{% endif %}>{{ p.name }} | {{ p.phone }} | {{ p.email }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="field">
          <label>Тип приема</label>
          <select name="type" id="encounter_type" required>
            <option value="">Выберите тип приема</option>
            {% for type_code, type_title in encounter_type_choices %}
              <option value="{{ type_code }}" {% if form_data.type == type_code %}selected{% endif %}>{{ type_title }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="field" id="bed_field">
          <label>Койка</label>
          <select name="bed_id" id="bed_id">
            <option value="">Выберите свободную койку</option>
            {% for bed in beds %}
              <option value="{{ bed.id }}" {% if form_data.bed_id == bed.id|string %}selected{% endif %}>
                Койка {{ bed.id }} | {{ bed.department_name }}
              </option>
            {% endfor %}
          </select>
        </div>
        <div class="field">
          <label>Начало приема</label>
          <input type="datetime-local" name="start_datetime" value="{{ form_data.start_datetime }}" required>
        </div>
        <div class="field">
          <label>Окончание приема</label>
          <input type="datetime-local" name="end_datetime" value="{{ form_data.end_datetime }}" required>
        </div>
      </div>
      <div class="actions">
        <button class="btn" type="submit">Сохранить прием</button>
      </div>
    </form>
  </div>
  <script>
    (function () {
      const typeSelect = document.getElementById("encounter_type");
      const bedField = document.getElementById("bed_field");
      const bedSelect = document.getElementById("bed_id");
      if (!typeSelect || !bedField || !bedSelect) return;
      function syncBedVisibility() {
        const isHospitalization = typeSelect.value === "inpatient";
        bedField.style.display = isHospitalization ? "" : "none";
        bedSelect.required = isHospitalization;
        if (!isHospitalization) bedSelect.value = "";
      }
      typeSelect.addEventListener("change", syncBedVisibility);
      syncBedVisibility();
    })();
  </script>
{% endblock %}
