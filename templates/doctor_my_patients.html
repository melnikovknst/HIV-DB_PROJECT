{% extends "base.html" %}
{% block content %}
  <h1>Мои пациенты</h1>
  <form method="get">
    <div class="grid">
      <div class="field">
        <label>Поиск по имени</label>
        <input type="text" name="name" value="{{ name }}">
      </div>
      <div class="field">
        <label>Поиск по patient_id</label>
        <input type="number" name="patient_id" value="{{ patient_id }}">
      </div>
    </div>
    <div class="actions">
      <button class="btn" type="submit">Найти</button>
      <a class="btn ghost" href="{{ url_for('doctor_create_encounter') }}">Создать прием</a>
    </div>
  </form>
  <table>
    <tr>
      <th>ID</th>
      <th>Имя</th>
      <th>Пол</th>
      <th>Телефон</th>
      <th>Email</th>
      <th>Профиль</th>
    </tr>
    {% for p in patients %}
    <tr>
      <td>{{ p.id }}</td>
      <td>{{ p.name }}</td>
      <td>{{ p.sex }}</td>
      <td>{{ p.phone }}</td>
      <td>{{ p.email }}</td>
      <td><a class="btn ghost" href="{{ url_for('doctor_patient', patient_id=p.id) }}">Открыть</a></td>
    </tr>
    {% endfor %}
  </table>
{% endblock %}
